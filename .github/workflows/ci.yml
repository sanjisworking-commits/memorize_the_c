name: CI

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          # Install the package without pulling heavy Docling into CI.
          pip install -e . --no-deps

      - name: Run unit tests
        run: pytest -m "not integration" -q --tb=short
