<!DOCTYPE html>
<html lang="en" data-theme-preference="{{ theme_preference|default('auto') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}{{ app_name|default('Recall the C') }}{% endblock %}</title>
  <script>
    (function () {
      var KEY = "cm-theme";
      var pref = document.documentElement.getAttribute("data-theme-preference") || "auto";
      try {
        var stored = localStorage.getItem(KEY);
        if (stored === "auto" || stored === "dark" || stored === "light") {
          pref = stored;
        }
      } catch (e) {}
      function systemDark() {
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      }
      function effective(p) {
        if (p === "dark") return "dark";
        if (p === "light") return "light";
        return systemDark() ? "dark" : "light";
      }
      var resolved = effective(pref);
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.setAttribute("data-theme-preference", pref);
      document.documentElement.style.colorScheme = resolved;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=sprint30e">
  <link rel="icon" href="/static/brand-c.png" type="image/png">
</head>
<body>
  {% set path = request.url.path %}
  <div class="page-wrap">
    <div class="sheet">
      <header class="site-header">
        <a class="brand" href="/" aria-label="{{ app_name|default('Recall the C') }} — Home">
          <img class="brand-mark" src="/static/brand-c.png" width="26" height="26" alt="">
          <span class="brand-wordmark">{{ app_name|default('Recall the C') }}</span>
        </a>
        <nav class="nav" aria-label="Primary">
          <a href="/" class="nav-link{% if path == '/' %} is-active{% endif %}">Home</a>
          <a href="/browse" class="nav-link{% if path.startswith('/browse') %} is-active{% endif %}">Browse</a>
          <a href="/tables" class="nav-link{% if path.startswith('/tables') %} is-active{% endif %}">Tables</a>
          <a href="/calendar" class="nav-link{% if path.startswith('/calendar') %} is-active{% endif %}">Calendar</a>
          <a href="/progress" class="nav-link{% if path.startswith('/progress') %} is-active{% endif %}">Progress</a>
          <a href="/settings" class="nav-link{% if path.startswith('/settings') %} is-active{% endif %}">Settings</a>
          <a href="/search" class="nav-link{% if path.startswith('/search') %} is-active{% endif %}">Search</a>
          <button
            type="button"
            class="theme-toggle"
            id="theme-toggle"
            title="Theme — follows your system in Auto"
            aria-label="Theme — follows your system in Auto"
            data-theme-pref="{{ theme_preference|default('auto') }}"
          >◐ Auto</button>
        </nav>
      </header>
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>
    <p class="sheet-footnote">Bare Act text verbatim · scheduling 1 → 3 → 7 → 14 → 30 → 60 days</p>
  </div>
  <script src="/static/recall_align.js?v=sprint22" defer></script>
  <script src="/static/app.js?v=sprint30e" defer></script>
</body>
</html>
