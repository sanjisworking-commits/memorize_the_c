<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Constitution Memorizer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="brand" href="/">Constitution Memorizer</a>
      <nav class="nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/browse">Browse</a>
        <a href="/search">Search</a>
        <a href="/progress">Progress</a>
      </nav>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/app.js" defer></script>
</body>
</html>
