{% extends "base.html" %}
{% block title %}{{ title }} · Constitution Memorizer{% endblock %}
{% block content %}
<section class="panel stub">
  <h1 class="display">{{ title }}</h1>
  <p class="lede">{{ message }}</p>
  {% if stats %}
  <div class="stat-line">
    <span>{{ stats.tracked }} tracked</span>
    <span>{{ stats.review }} in review</span>
    <span>{{ stats.mastered }} mastered</span>
  </div>
  {% endif %}
  <p><a class="btn btn-ghost" href="/">Back home</a></p>
</section>
{% endblock %}
